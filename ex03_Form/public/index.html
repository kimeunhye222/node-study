<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- form 태그 : 데이터를 서버에 전달하기 위한 태그
        전송 방식 1) get (기본 전달 방식으로 생략이 가능하다)
        - 사용자가 보내는 데이터가 URL에 노출이된다.
        - 보안X, 데이터를 보내는 길이가 제한이 있다.
        - 데이터를 보내기 위해 쿼리스트링 문법 사용한다!
           ex) http://www.naver.com?키=값
        전송 방식 2) post
        - 데이터를 웹브라우저의 body에 담아 전달한다.
        - 보안o, 데이터를 전달하는 길이에 제한이 없다.
        - 회원가입, 로그인, 게시글 작성 등 CRUD와 관련된 내용을 작성할때 사용한다
         --> 
     <h3>get 방식</h3>
     <form action="/getkeyword" method="get">
        <input type="text" placeholder="검색어를 입력하세요" name="keyword">
        <input type="submit" value="검색">
     </form>

     <hr>
     <h3>post 방식</h3>
     <form action="/postLogin" method="post">
        <input type="text" placeholder="아이디를 입력하세요" name="id">
        <input type="password" placeholder="비밀번호를 입력하세요" name="pw">
        <input type="submit" value="로그인">
     </form>
</body>
</html>
